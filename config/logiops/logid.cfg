// Logitech MX Master 3S configuration for GNOME/Wayland
// Place in /etc/logid.cfg
// Requires: sudo dnf install logiops && sudo systemctl enable --now logid

devices: ({
  name: "MX Master 3S";

  smartshift: {
    on: true;
    threshold: 20;
  };

  hiresscroll: {
    hires: true;
    invert: false;
    target: false;
  };

  dpi: 1600;

  buttons: (
    // Thumb gesture button -> GNOME window management
    {
      cid: 0xc3;
      action = {
        type: "Gestures";
        gestures: (
          { direction: "Up";    mode: "OnRelease"; action = { type: "Keypress"; keys: ["KEY_LEFTMETA", "KEY_UP"]; }; },
          { direction: "Down";  mode: "OnRelease"; action = { type: "Keypress"; keys: ["KEY_LEFTMETA", "KEY_DOWN"]; }; },
          { direction: "Left";  mode: "OnRelease"; action = { type: "Keypress"; keys: ["KEY_LEFTMETA", "KEY_LEFT"]; }; },
          { direction: "Right"; mode: "OnRelease"; action = { type: "Keypress"; keys: ["KEY_LEFTMETA", "KEY_RIGHT"]; }; },
          { direction: "None";  mode: "OnRelease"; action = { type: "Keypress"; keys: ["KEY_LEFTMETA"]; }; }
        );
      };
    },

    // Top button -> SmartShift toggle + DPI cycle
    {
      cid: 0xc4;
      action = {
        type: "Gestures";
        gestures: (
          { direction: "Up";   mode: "OnRelease"; action = { type: "CycleDPI"; dpis: [800, 1200, 1600, 2400, 4000]; }; },
          { direction: "Down"; mode: "OnRelease"; action = { type: "CycleDPI"; dpis: [4000, 2400, 1600, 1200, 800]; }; },
          { direction: "None"; mode: "OnRelease"; action = { type: "ToggleSmartShift"; }; }
        );
      };
    },

    // Back button
    {
      cid: 0x53;
      action = { type: "Keypress"; keys: ["KEY_BACK"]; };
    },

    // Forward button
    {
      cid: 0x56;
      action = { type: "Keypress"; keys: ["KEY_FORWARD"]; };
    }
  );
});
